server:
  port: 8081

spring:
  application:
    name: banking-payment-service
  profiles:
    default: dev
  cache:
    type: redis
    cache-names:
      - accounts
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:banking-payment-service-jwt-secret-key-change-me-1234567890}
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,cacheevict
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: banking-payment-service
    description: Banking payment service with JWT, async checks, and Redis support

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/banking_payment_service_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:banking_payment_service_prod}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME:banking_user}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
